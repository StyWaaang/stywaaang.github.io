        <!-- 写了这么久的日记，最大的感触是，时间过的真快。

# Mon 2.20

周振源来找我组队了。其实不是他直接找我组队的。他一开始只是问我，软工课是不是和他在一个班，我回答是。由于我本打算和他一起再加几个人组成队伍，所以我直接问他是否要组队。他立刻同意了，并把我拉到了一个群里。群里有 ysy 同学，还有两个其他的同学。

看到 ysy，我就意识到，我不想在这个组呆着。

ysy：岳诗扬

# Tue 2.21

今天六点半起床的，起床后计划要完成两件事：
1. 提醒吴老师上课时展示一下二维码，让同学进群
2. 把写好的实验发给赵慧雅，让她看一下

结果起床后只完成了第一项，第二项因为起床后太紧张于是没干。

今天有早八软工，最重要的任务是组队。

我给自己规定了一个行动计划，将按照如下顺序依次执行：
1. 早八上课，观察谁在班里
2. 如果 gy 在班里，那么立刻找 gy 组队
3. 否则，找其他认识的男生组队
4. 一旦上面两步的组队完成，则直接在已经组好的群里说一下，退出已有的队
5. 如果实在找不到别人，那就继续在这个队里呆着吧

七点半去吃早饭，真的很紧张，吃饭都吃不下。吃了一张肉饼，一个鸡蛋，连豆浆都没心情喝。

八点到了教室，坐到了第一排。侧头扫了一眼教室，没想到真看到了 gy。

不得不说，这个概率真的不大。软工除了罗杰，总共 4 个班，罗杰 2 个班按照一个班算，如果已经确定我在哪个班，那么她也在这个班的概率大概也就是五分之一左右，概率不大。

所以，能在这个班里遇见她，也算是十分幸运了。

我坐在座位上，一阵窃喜。毫不夸张的说，我一边听着课程介绍，我甚至都在思考以后怎么约她出来玩，约她去哪里玩。这是一种又紧张又兴奋的感觉。

九点十分左右，第二位老师来讲解实验部分的内容。这个时候我们建立了班级微信群，我在其中看到了几个认识的人，觉得可以一起组队。

九点三十五下课，九点二十的时候我已经按捺不住我的双手了。我想立刻给她发送组队的信息。于是，我拟好了一句话，打算下课后等几分钟就立刻发送。

为了避免 zzy 同学找到我，下课后我立刻背书包跑了。我出门的时候，感觉真的都走路带着风。

我从新主楼直接走到了海棠咖啡，点了一杯热美式。与此同时，我给 zyg 和 gy 同学同时发送了组队请求。

咖啡拿到后，zyg 同学回复我了，他说他还没有组，可以一起。得知这个消息后，我便可以脱离原先的预定队伍，组建新的队伍了。不过由于还没有确定新的组，直接在旧组群里说退出也不太好，所以我私聊了 zzy，告诉他说“之前有个人找我组队，我给忘了，可能需要再找他确认一下”。

可是 gy 同学迟迟不回复我。有两种可能：
- 她看到，看到后就会同意组队
- 她看到了，在思考如何拒绝

感觉和表白后的等待挺像的呀。

从我的角度来说，肯定希望是第一种。于是我非常紧张，又再时刻幻想她同意后的画面。

我端着热乎乎的咖啡，从海棠往主楼走。我内心的紧张完全无法压抑，端着咖啡的手已经开始颤抖，咖啡甚至洒了出来。我举起咖啡，喝了一口，还是因为太紧张，咖啡还洒在了衣服上一点。

我不断询问着自己，这种小场面，为什么要如此紧张。同时我在控制着自己，无论遇到什么事情，都要保持淡定。这种淡定必须是内心的淡定，不能乱了阵脚，表现出来什么样，那无所谓。我对自己在这方面的表现还是比较满意的，例如遇到比较突发的事情，我基本还是可以保持清醒的。

到了主楼，三四层间找了个窗边坐下，继续喝着咖啡。

然后觉得肚子有点疼，想去厕所。在厕所里蹲下并放松过后，看到了 gy 发来的消息：

> f

不幸的消息。

后来我一度，那啥，她为什么要跟 4 个女生组队。4 个女生的队伍，怎么能好的完成任务呢。这门课本来就是嵌入式软工，4 个妹子一起做，我也是拭目以待了。我还真不是小看他们，主要是一个机器人有半人高，4 个女生能搬动就不错了。

不过我并没有那么悲伤。之前跟 bjy 表白被拒绝的时候我也不那么悲伤。这可能是我的一个风格？非常在意的事情如果失去了，我大概会找很多理由作为慰藉。不过此事对我来说也没那么重要，无非是想要泡妹子但是失败了。

由于我一开始觉得她们四人并不是那么熟（理由有二：一是下课后另外两个和她坐在一起的人立刻走了，没等她，二是另外三人组队打美赛，没有她），所以我认为她可能会选择退出她们，和我们组队。所以我回复了她，字里行间透露着希望让她退出他们组：

> g

zyg 已经同意和我一组，这是一个好消息。

在一个团队中，我最看中的是能否通力合作。每个个人的水平和行动力，不足以对整个团队构成巨大的影响，因为我们的团队是小团队，只有 4-5 个人，其中水平高的有一两个人就足够了。

这门课刚好是软件工程，最强调的并不是成果的质量，而是组内合作情况，这个才是软件工程里最重要的。我们在这门课中要学会团队处理复杂工程的方法，而并非简单的写程序的课程。

王小鸽那样的人，是最不能组队的。这样的人，虽然个人能力相对强一点，但是没有合作能力，无法沟通，控制欲强。

我很坚定的要退出原来那个组，就是因为其中有 ysy。我认为他情绪不成熟，沟通能力弱。我看过他在 500 人大群里和其他同学吵架，而且还有很多次吵架。今天下午他俩又在群里吵架。虽然说是另外的同学理亏，那个同学确实不讲理，但是无论如何他参与吵架，我就有充分的理由认为他的沟通能力弱，情绪不成熟。

zyg 同学也是 OO 助教。在我看来，OO 助教的选拔是非常科学的，不仅考察了候选人的技术水平，更考察了沟通能力、表达能力、社交能力等。因此，我觉得和 zyg 同学一组，我们就有很多可以完成的事情，合作会十分顺利的。

之后我去找到了编译课的老师。大概十一点半吧，我到了办公室门口。网站上写了他的两个办公室，我先去了新主楼

今天晚上 19:00，OO 第一周作业就要开放了。下午我在群里发布了群公告，写了若干个注意事项。晚上本来打算出去学，结果到了宿舍觉得很困，一直在宿舍聊天，之后一起去 seven-eleven 买了点东西，回宿舍后又背了背单词，睡觉了。

# Wed 2.22

早上 6:37 起的。起床后觉得太困，还想再睡会儿，就又上床了。再下床就是 7:45 了，洗漱后带着昨天的鸡排三明治路上一边吃一边走。

第一节课是《计算机体系结构》，白跃彬老师的一般专业选修课。本来有 21 个人选，还有 3 个对外的人，总共人数还是挺多的。白老师很高兴，直接说“我非常高兴有这么多人对这门课感兴趣，但这是一门硬核课，不是刷分课”。草，开始劝退了。

“建议大家在最终选课前考虑考虑”。

“大家要做好决断，看自己是否感兴趣，是否能坚持下去”。

“大家选这门课，我们很欢迎，但是我们要把情况说在前面，……”。

遗憾。

这门课的成绩组成是这样的：
- 作业 30%
- 考试 40%
- 实验 30%

所以确实事儿挺多的。不过我还是会继续选。

下课后出教室的时候搭讪了也选了这门课的男生，他说他看这个课题目叫《计算机体系结构》，非常宏大，所以感觉课就是随便讲点玩的，于是现在考虑退课。

之后去上《计算机科学方法论》，妈的，什么傻逼玩意。读论文，每周汇报，好像还要写一堆材料。这个老师是搞 HPC 的，我真草了。说是助教批作业的工作量大，所以这个每个班 19 个人的课，竟然配了 4 个助教。从此可以看出，这门课学生的工作量可能更大一点 :( 

和马哥一起讨论了这种东西。你想要培养学生的表达能力，根本就不能通过开课的这种形式。你开了这门课，希望培养学生的表达能力，但是给出了严格的评分标准，那同学们不可能投入到你期望的课程中，而是一头扎进这门课的考核方式所对应的那些事务中。真希望培养表达能力，不如把学校整体的人文氛围提上来，把开放、交流的风格融入到校园中，这样才行。

下午去跑了步，本来打算跑步、吃饭、洗澡，结果开始跑步已经六点多了，七点还有课。所以跑完步洗完澡就买了个面包，打算晚上上课后回来再吃，当晚饭了。

晚上的课是《实时嵌入式应用系统》，也是白跃彬老师主讲。一进教室，加上我只有 6 个人。老师第一句话是，“我们这门课目前有 8 个人选，有危险”。之后就开始劝说同学们不要退课，说了什么“我们这个课性价比很高”之类的话。毕竟，3 学分的课，没有期末考试，做出来就是 85+，做得好就是 95+，确实性价比挺高的。

课间有同学问老师课程的具体任务，我也上前象征性的问了点问题，之后去上厕所了。回来后发现老师点了一遍名单，认识我了。

我假期邮件问过他课，也直接加了微信，所以他知道我的名字。他知道我的名字后，含笑着看着我，我感觉他是真的为了有学生在系统结构方面感兴趣而高兴，虽然这么说很傻逼。

总的来说，感觉这个老师还是很和蔼的，而且我和他可能有一种共鸣。

# Thu 2.23

六点半起床，去合一三层吃了抄手。太难吃了，再也不吃了。

七点二十到窗口点餐，他们现找食材、现加工、现煮，大概七点三十五才拿到。抄手又很烫，一点点吃，吃了十分钟，结果差点迟到。

早八计网，困死了。

九点半下课之后就没事了，不过好像啥都没干。

给教务发了邮件，不知道能否把 x86 这个课给我选上。《实时嵌入式应用系统》这个课大概律是开不了了，现在只有 5 个人选课了。

中午回宿舍睡了一觉，睡到了快三点。

下午找了找白跃彬老师的论文，我搜索了他从 2003 年入职以来的所有论文，并对找 CCF 推荐会议和期刊目录，发现他好像 CCF C 类期刊/会议发表的比较多，比较顶级的比较少。不过我后来一想，这样也没什么。毕竟是做这种安全攸关的系统，很多东西是直接应用了，比如他们做的一个飞机上的机载系统前两天好像刚刚上天，像这种成果有意义、但发不了论文，也不仅仅是和企业合作赚钱的那种横向项目。

晚上和马哥一起吃了顿饭，之后聊了很多，包括学校教育、小组合作、人际关系、亲密关系等等，竟然聊到了晚上八点。之后手机就没电了，直接回宿舍了。

到宿舍聊了会儿天儿，之后竟然全体学习英语，太牛了。
